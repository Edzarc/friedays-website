<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Friedays Bocaue</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card auth-card-small">
            <div class="brand-header">
                <h1>Friedays Bocaue</h1>
                <p>Reset Your Password</p>
            </div>

            <form id="forgotPasswordForm">
                <div class="input-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
                    <span class="error-message" id="error-email"></span>
                </div>

                <div class="info-box">
                    <p>We'll send you a link to reset your password. The link will expire in 30 minutes.</p>
                </div>

                <button type="submit" class="btn-primary">Send Reset Link</button>

                <div id="successMessage" class="success-message" style="display: none;">
                    ✅ If an account exists with this email, you will receive a password reset link.
                </div>
            </form>

            <p class="auth-link">
                Remember your password? <a href="index.html">Login here</a> or <a href="register.html">Create an account</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
