<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Friedays Bocaue</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="brand-header">
                <h1>Friedays Bocaue</h1>
                <p>Create Your Account</p>
            </div>

            <form id="registerForm">
                <div class="form-row">
                    <div class="input-group">
                        <label for="first_name">First Name *</label>
                        <input type="text" id="first_name" name="first_name" placeholder="John" required>
                        <span class="error-message" id="error-first_name"></span>
                    </div>
                    <div class="input-group">
                        <label for="last_name">Last Name *</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Doe" required>
                        <span class="error-message" id="error-last_name"></span>
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Email Address *</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                    <span class="error-message" id="error-email"></span>
                </div>

                <div class="input-group">
                    <label for="phone">Phone Number (Philippines +63XXXXXXXXXX) *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+639123456789" required>
                    <span class="error-message" id="error-phone"></span>
                </div>

                <div class="input-group">
                    <label for="password">Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter a strong password" required>
                        <button type="button" class="toggle-password icon-btn">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                    <div class="password-strength" id="password-strength"></div>
                    <span class="error-message" id="error-password"></span>
                </div>

                <div class="input-group">
                    <label for="password_confirm">Confirm Password *</label>
                    <div class="password-wrapper">
                        <input type="password" id="password_confirm" name="password_confirm" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-password icon-btn">
                            <span class="material-symbols-outlined">visibility</span>
                        </button>
                    </div>
                    <span class="error-message" id="error-password_confirm"></span>
                </div>

                <div class="input-group">
                    <label for="address_line1">Address *</label>
                    <input type="text" id="address_line1" name="address_line1" placeholder="123 Main Street" required>
                    <span class="error-message" id="error-address_line1"></span>
                </div>

                <div class="input-group">
                    <label for="address_line2">Apartment/Suite (Optional)</label>
                    <input type="text" id="address_line2" name="address_line2" placeholder="Apt 4B">
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="city">City *</label>
                        <input type="text" id="city" name="city" placeholder="Bocaue" required>
                        <span class="error-message" id="error-city"></span>
                    </div>
                    <div class="input-group">
                        <label for="postal_code">Postal Code *</label>
                        <input type="text" id="postal_code" name="postal_code" placeholder="3002" required>
                        <span class="error-message" id="error-postal_code"></span>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="marketing_opt_in" name="marketing_opt_in">
                    <label for="marketing_opt_in">Subscribe to promotional emails and newsletters</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms_accepted" name="terms_accepted" required>
                    <label for="terms_accepted">I agree to the <a href="#" target="_blank">Terms & Conditions</a> *</label>
                    <span class="error-message" id="error-terms_accepted"></span>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="privacy_accepted" name="privacy_accepted" required>
                    <label for="privacy_accepted">I agree to the <a href="#" target="_blank">Privacy Policy</a> *</label>
                    <span class="error-message" id="error-privacy_accepted"></span>
                </div>

                <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
            </form>

            <div class="social-login">
                <p class="divider-text">Or sign up with</p>
                <div class="social-buttons">
                    <a href="http://localhost:5000/auth/google" class="btn-social btn-google" title="Sign up with Google">
                        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </a>
                    <a href="http://localhost:5000/auth/facebook" class="btn-social btn-facebook" title="Sign up with Facebook">
                        <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        Facebook
                    </a>
                </div>
            </div>

            <p class="auth-link">
                Already have an account? <a href="index.html">Login here</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
